<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="box" class="box">Привет</div>
  <button onclick="restart()">Перезапуск</button>
</body>
  <script>
function restart() {
  const box = document.getElementById("box");

  box.classList.remove("box"); // убрать анимацию
  void box.offsetWidth;        // заставить браузер "обновиться"
  box.classList.add("box");    // заново запустить
}
</script>
</html>
